server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/bishe_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: qdx-bishe-jwt-secret-key-please-change
    expiration-hours: 24
  cors:
    allowed-origins:
      - http://localhost:5173
  llm:
    provider: openai-compatible
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: sk-21eb85bfd2e642f2a3a48338fb434edc
    model: qwen-math-plus
    available-models:
      - qwen-math-plus
      - qwen-math-turbo
    temperature: 0.2
    enable-thinking: false
    connect-timeout-ms: 5000
    read-timeout-ms: 60000

logging:
  level:
    com.qdx.bishe: info
